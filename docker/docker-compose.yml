services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-connect:
    image: confluentinc/cp-kafka-connect-base:7.5.0
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/filestream-connectors,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt snowflakeinc/snowflake-kafka-connector:2.1.2
        /etc/confluent/docker/run
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/connectors" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - connect_data:/usr/share/confluent-hub-components

  kafka-connect-provisioner:
    image: curlimages/curl:latest
    depends_on:
      kafka-connect:
        condition: service_healthy
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        curl -X POST -H "Content-Type: application/json" \
          --retry 5 --retry-delay 3 --retry-connrefused \
          --data '{
            "name": "snowflake-coinbase-sink",
            "config": {
              "connector.class": "com.snowflake.kafka.connector.SnowflakeSinkConnector",
              "tasks.max": "1",
              "topics": "coinbase.trade.btcusd.raw",
              "snowflake.topic2table.map": "coinbase.trade.btcusd.raw:COINBASE_TRADE_BTCUSD_RAW",
              "snowflake.url.name": "${SNOWFLAKE_URL}",
              "snowflake.user.name": "${SNOWFLAKE_USER}",
              "snowflake.private.key": "${SNOWFLAKE_KEY}",
              "snowflake.database.name": "LIQUIDRADAR",
              "snowflake.schema.name": "TRADE",
              "key.converter": "org.apache.kafka.connect.storage.StringConverter",
              "value.converter": "org.apache.kafka.connect.json.JsonConverter",
              "value.converter.schemas.enable": "false",
              "buffer.count.records": "10000",
              "buffer.flush.time": "60"
            }
          }' http://kafka-connect:8083/connectors

  coinbase-producer:
    build: ..
    depends_on:
      - kafka
      - kafka-connect-provisioner

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  connect_data: